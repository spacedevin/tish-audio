<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi-Fi Web DAW (Schlop Engine)</title>
    <style>
        :root {
            --bg: #0e0e12;
            --panel: #1a1a24;
            --text: #e0e0e0;
            --kick: #ff0055;
            --bass: #b200ff;
            --clap: #00ffcc;
            --hatc: #ffaa00;
            --hato: #ffea00;
            --synth: #0088ff;
            --tesla: #00ffff;
            --c2c: #ff00ff;
            --grid-bg: #111118;
            --grid-line: #2a2a35;
        }
        
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; margin: 0; padding: 20px; user-select: none;
        }
        .container {
            background: var(--panel); padding: 30px; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid #222; width: 100%; max-width: 1050px;
            display: flex; flex-direction: column; gap: 20px;
        }
        h1 {
            font-size: 28px; margin: 0; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(90deg, var(--clap), var(--kick));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .controls {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;
            min-width: 0; flex: 1; margin-left: 20px;
        }
        button {
            padding: 12px 24px; font-size: 13px; font-weight: 800; color: #fff;
            background: #2a2a35; border: 1px solid #333; border-radius: 6px;
            cursor: pointer; transition: all 0.2s ease; text-transform: uppercase;
            letter-spacing: 1px; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 200px; min-width: 80px; flex-shrink: 1;
        }
        button:hover { transform: translateY(-2px); background: #3a3a45; }
        button.active-chem { background: var(--clap); color: #000; border-color: var(--clap); box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); }
        button.active-sp { background: var(--kick); color: #fff; border-color: var(--kick); box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); }
        button.active-tesla { background: var(--tesla); color: #000; border-color: var(--tesla); box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
        button.active-c2c { background: var(--c2c); color: #fff; border-color: var(--c2c); box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        #stopBtn { background: transparent; border-color: #555; }
        #stopBtn:hover { background: #ffaa00; border-color: #ffaa00; color: #000;}

        .visualizer-container {
            position: relative; width: 100%; height: 150px; background: #000;
            border-radius: 8px; border: 1px solid #333; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hud {
            position: absolute; top: 10px; left: 15px; color: rgba(255,255,255,0.6);
            font-family: monospace; font-size: 11px; pointer-events: none; text-shadow: 1px 1px 2px #000;
        }

        .arranger-wrapper {
            background: var(--grid-bg); border: 1px solid #333; border-radius: 8px;
            padding: 10px; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--clap) var(--grid-bg);
        }
        .arranger-wrapper::-webkit-scrollbar { height: 8px; }
        .arranger-wrapper::-webkit-scrollbar-track { background: var(--grid-bg); }
        .arranger-wrapper::-webkit-scrollbar-thumb { background-color: #555; border-radius: 10px; }
        
        .bar-label {
            width: 40px; flex-shrink: 0; text-align: center; font-size: 10px; color: #888;
            cursor: pointer; padding: 4px 0; border-radius: 4px; border: 1px solid transparent; 
            transition: background 0.2s, color 0.2s;
        }
        .bar-label:hover { background: var(--grid-line); color: #fff; }
        .track { display: flex; align-items: center; height: 36px; margin-bottom: 4px; position: relative; width: max-content; }
        .track-label {
            width: 100px; font-size: 11px; font-weight: bold; color: #aaa; text-align: right;
            padding-right: 10px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
        }
        .track-grid { display: flex; gap: 2px; position: relative; width: max-content; }
        .grid-cell {
            width: 40px; flex-shrink: 0; height: 30px; background: #1a1a24;
            border: 1px solid var(--grid-line); border-radius: 3px; cursor: pointer; transition: background 0.1s, opacity 0.1s;
        }
        .grid-cell:hover { opacity: 0.8; }
        
        .track-kick .grid-cell.active { background: var(--kick); border-color: var(--kick); box-shadow: 0 0 8px rgba(255,0,85,0.4); }
        .track-bass .grid-cell.active { background: var(--bass); border-color: var(--bass); box-shadow: 0 0 8px rgba(178,0,255,0.4); }
        .track-clap .grid-cell.active { background: var(--clap); border-color: var(--clap); box-shadow: 0 0 8px rgba(0,255,204,0.4); }
        .track-hatc .grid-cell.active { background: var(--hatc); border-color: var(--hatc); box-shadow: 0 0 8px rgba(255,170,0,0.4); }
        .track-hato .grid-cell.active { background: var(--hato); border-color: var(--hato); box-shadow: 0 0 8px rgba(255,234,0,0.4); }
        .track-synth .grid-cell.active { background: var(--synth); border-color: var(--synth); box-shadow: 0 0 8px rgba(0,136,255,0.4); }
        .c2c-active .track-synth .grid-cell.active { background: var(--c2c); border-color: var(--c2c); box-shadow: 0 0 8px rgba(255,0,255,0.4); }

        .playhead-track { position: absolute; top: 0; left: 100px; bottom: 0; pointer-events: none; display: flex; gap: 2px; z-index: 10; width: max-content; }
        .playhead-col { width: 40px; flex-shrink: 0; background: rgba(255, 255, 255, 0.0); border: 1px solid transparent; transition: background 0.05s; }
        .playhead-col.playing { background: rgba(255, 255, 255, 0.15); border-left-color: rgba(255,255,255,0.5); border-right-color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="header">
            <div style="flex-shrink: 0;">
                <h1>Hi-Fi Web DAW</h1>
                <div style="font-size: 12px; color: #888; margin-top: 4px;">Algorithmic Full-Track Generation Engine</div>
            </div>
            <div class="controls">
                <button id="btnChem" title="Chemistry (5:27)">Chemistry (5:27)</button>
                <button id="btnSp" title="Take Your Places (3:00)">Take Your Places (3:00)</button>
                <button id="btnTesla" title="Tesla (3:40)">Tesla (3:40)</button>
                <button id="btnC2c" title="C2C - Le Banquet (4:56)">C2C - Le Banquet (4:56)</button>
                <button id="stopBtn" title="Pause / Resume">Pause</button>
            </div>
        </div>
        
        <div class="visualizer-container">
            <canvas id="scopeCanvas"></canvas>
            <div class="hud" id="hudText">STATUS: IDLE<br>TIME: 0:00 / 0:00</div>
        </div>

        <div class="arranger-wrapper">
            <div style="font-size: 11px; color: #888; margin-bottom: 10px; display: flex; justify-content: space-between;">
                <span>MIXING CONSOLE. AUDIO IS PROCEDURALLY GENERATED AND CONTINUALLY EVOLVES UNDERNEATH. MUTE/UNMUTE TO HEAR STEMS.</span>
                <span style="color: var(--clap);">SCROLL RIGHT ➔</span>
            </div>
            
            <div class="track" style="height: auto; margin-bottom: 5px;">
                <div class="track-label"></div>
                <div class="track-grid" id="barLabels"></div>
            </div>

            <div style="position: relative; width: max-content;">
                <div class="playhead-track" id="playheadTrack"></div>
                <div id="tracksContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const btnChem = document.getElementById('btnChem');
        const btnSp = document.getElementById('btnSp');
        const btnTesla = document.getElementById('btnTesla');
        const btnC2c = document.getElementById('btnC2c');
        const stopBtn = document.getElementById('stopBtn');
        const canvas = document.getElementById('scopeCanvas');
        const hudText = document.getElementById('hudText');
        const barLabels = document.getElementById('barLabels');
        const tracksContainer = document.getElementById('tracksContainer');
        const playheadTrack = document.getElementById('playheadTrack');
        const arrangerWrapper = document.querySelector('.arranger-wrapper');
        const mainContainer = document.getElementById('mainContainer');
        const canvasCtx = canvas.getContext('2d');

        canvas.width = 1000; canvas.height = 150;

        let TOTAL_BARS = 0; let TOTAL_STEPS = 0; const STEPS_PER_BAR = 16;
        let arrangement = {}; let currentSong = 'chem'; let bpm = 126;
        let ctx; let isPlaying = false; let currentStep = 0; let nextNoteTime = 0;
        let schedulerTimer; let animationId;
        
        let masterCompressor, masterGain, masterSaturation, sidechainBus, delayNode, delayFeedback, delayFilter;
        let analyserScope, analyserSpectrum; let scopeData, spectrumData;
        let globalScratchBufferFwd = null; let globalScratchBufferRev = null; let globalNoiseBuffer = null;

        const TRACK_DEFS = [
            { id: 'kick', name: 'KICK', class: 'track-kick' },
            { id: 'bass', name: 'BASS', class: 'track-bass' },
            { id: 'clap', name: 'CLAP / SNR', class: 'track-clap' },
            { id: 'hatc', name: 'HAT (CLOSED)', class: 'track-hatc' },
            { id: 'hato', name: 'HAT (OPEN)', class: 'track-hato' },
            { id: 'synth', name: 'PAD / LEAD', class: 'track-synth' } 
        ];

        // ---------------------------------------------------------
        // FULL TRACK ALGORITHMIC COMPILERS
        // Replaces the looping arrays. These generate custom step-by-step
        // automation objects {a: active, v: velocity, p: parameter} for every beat.
        // ---------------------------------------------------------
        
        let fullTrackData = { kick: [], bass: [], clap: [], hatc: [], hato: [], synth: [] };

        function initTrackArrays(steps) {
            fullTrackData = { kick: new Array(steps), bass: new Array(steps), clap: new Array(steps), hatc: new Array(steps), hato: new Array(steps), synth: new Array(steps) };
            for(let i=0; i<steps; i++) {
                fullTrackData.kick[i] = {a:0}; fullTrackData.bass[i] = {a:0}; fullTrackData.clap[i] = {a:0};
                fullTrackData.hatc[i] = {a:0}; fullTrackData.hato[i] = {a:0}; fullTrackData.synth[i] = {a:0};
            }
        }

        function compileChem() {
            bpm = 126; TOTAL_BARS = 172; TOTAL_STEPS = TOTAL_BARS * 16;
            initTrackArrays(TOTAL_STEPS);
            for (let i = 0; i < TOTAL_STEPS; i++) {
                let bar = Math.floor(i / 16); let pos = i % 16;
                let isBreak = bar >= 64 && bar < 96;

                // Kick: 4-on-the-floor, mutes in breakdown, builds up
                if (!isBreak && pos % 4 === 0) fullTrackData.kick[i] = {a:1};
                if ((bar === 63 || bar === 95) && pos >= 8) fullTrackData.kick[i] = {a:1}; // Rolling fill

                // Clap: 2 and 4, heavy rolling in build
                if (!isBreak && bar > 15 && (pos === 4 || pos === 12)) fullTrackData.clap[i] = {a:1};
                if (bar === 95 && pos >= 8) fullTrackData.clap[i] = {a:1};

                // Hats: Evolve from offbeats to 16ths
                if (bar > 7 && pos % 2 === 0) fullTrackData.hatc[i] = {a:1, v: 0.04 + (Math.random()*0.02)};
                if (bar > 23 && !isBreak && pos % 4 === 2) fullTrackData.hato[i] = {a:1, v: 0.06};
                if (bar > 31 && !isBreak && pos % 2 === 1) fullTrackData.hatc[i] = {a:1, v: 0.03};

                // Bass: Rolling pattern, dynamic filter sweeps, note changes at phrasing
                if (!isBreak && bar > 15) {
                    if (pos === 2 || pos === 6 || pos === 10 || pos === 14 || (bar > 31 && pos === 13)) {
                        let note = 43.65; // F1
                        if (bar % 8 >= 6) note = 38.89; // Eb1 Turnaround
                        
                        let cutoff = 200;
                        if (bar >= 16 && bar < 32) cutoff = 200 + ((bar-16)*25) + pos; // Build sweep
                        else if (bar >= 32 && bar < 64) cutoff = 600 + Math.sin((bar*16+pos)*0.1)*150; // LFO modulation
                        else cutoff = 500;
                        
                        fullTrackData.bass[i] = {a:1, p: cutoff, n: note};
                    }
                }

                // Synth: Evolving chords in breakdown
                if (pos === 0 && bar % 2 === 0) {
                    if (isBreak) {
                        let chords = [43.65*2, 51.91*2, 38.89*2, 43.65*2]; // Fmin, Ab, Eb, Fmin
                        fullTrackData.synth[i] = {a:1, p: chords[(bar/2)%4]};
                    } else if (bar > 95) {
                        fullTrackData.synth[i] = {a:1, p: 43.65*4}; // Ethereal drone
                    }
                }
            }
        }

        function compileSp() {
            bpm = 128; TOTAL_BARS = 96; TOTAL_STEPS = TOTAL_BARS * 16;
            initTrackArrays(TOTAL_STEPS);
            for (let i = 0; i < TOTAL_STEPS; i++) {
                let bar = Math.floor(i / 16); let pos = i % 16;
                let isBreak = bar >= 64 && bar < 80;

                // Kick: 4-on-the-floor with specific syncopation
                if (!isBreak && pos % 4 === 0) fullTrackData.kick[i] = {a:1};
                if (!isBreak && bar % 8 === 7 && pos === 14) fullTrackData.kick[i] = {a:1}; // Double kick turnaround

                if (!isBreak && (pos === 4 || pos === 12)) fullTrackData.clap[i] = {a:1};
                if (!isBreak && pos % 2 === 0) fullTrackData.hatc[i] = {a:1, v: 0.05};
                if (bar > 15 && pos % 4 === 2) fullTrackData.hato[i] = {a:1, v: 0.07};

                // Bass: FM Donk intensity scales massively over the drop
                if (!isBreak && bar > 15) {
                    if (pos === 0 || pos === 3 || pos === 8 || pos === 10) {
                        let fmIntensity = 150;
                        if (bar >= 32 && bar < 64) fmIntensity = 200 + ((bar-32)*5); // Linear automation
                        if (bar >= 80) fmIntensity = 350 + Math.random()*50; // Chaotic automation
                        fullTrackData.bass[i] = {a:1, p: fmIntensity};
                    }
                }

                // Synth: Stab rhythms
                if (!isBreak && bar > 31 && pos === 8) fullTrackData.synth[i] = {a:1, p: 49.00*4}; // G3 Stab
            }
        }

        function compileTesla() {
            bpm = 126; TOTAL_BARS = 116; TOTAL_STEPS = TOTAL_BARS * 16;
            initTrackArrays(TOTAL_STEPS);
            for (let i = 0; i < TOTAL_STEPS; i++) {
                let bar = Math.floor(i / 16); let pos = i % 16;
                let isBreak = bar >= 64 && bar < 80;

                if (!isBreak && pos % 4 === 0) fullTrackData.kick[i] = {a:1};
                if (!isBreak && (pos === 4 || pos === 12)) fullTrackData.clap[i] = {a:1};
                if (bar > 15 && pos % 1 === 0) fullTrackData.hatc[i] = {a:1, v: 0.04}; // Relentless 16ths
                if (bar > 31 && pos % 4 === 2) fullTrackData.hato[i] = {a:1, v: 0.07};

                // Acid Bass: 303 Cutoff automation is king
                if (!isBreak && bar > 15) {
                    if (pos === 2 || pos === 3 || pos === 5 || pos === 10 || pos === 11 || pos === 13 || pos === 15) {
                        let cutoff = 800;
                        if (bar >= 16 && bar < 32) cutoff = 800 + Math.pow((bar-16)/16, 2) * 2000; // Exponential squelch rise
                        else if (bar >= 32 && bar < 64) cutoff = 2500 - (pos*50); // Plucky drop
                        else cutoff = 1500;
                        
                        let note = 41.20; // E1
                        if (bar % 4 === 3 && pos >= 8) note = 36.71; // D1 walkdown
                        fullTrackData.bass[i] = {a:1, p: cutoff, n: note};
                    }
                }
                if (!isBreak && pos === 0 && bar % 2 === 0 && bar > 31) fullTrackData.synth[i] = {a:1, p: 41.20*8};
            }
        }

        function compileC2c() {
            bpm = 105; TOTAL_BARS = 124; TOTAL_STEPS = TOTAL_BARS * 16;
            initTrackArrays(TOTAL_STEPS);
            for (let i = 0; i < TOTAL_STEPS; i++) {
                let bar = Math.floor(i / 16); let pos = i % 16;
                let isBreak = bar >= 64 && bar < 80;

                // Acoustic Boom Bap Kit
                if (!isBreak && (pos === 0 || pos === 6 || (bar % 2 === 1 && pos === 14))) fullTrackData.kick[i] = {a:1};
                if (!isBreak && (pos === 4 || pos === 12)) fullTrackData.clap[i] = {a:1}; // Rimshot snare
                // Humanized swinging hi-hats
                if (bar > 7 && pos % 2 === 0) fullTrackData.hatc[i] = {a:1, v: pos % 4 === 0 ? 0.08 : 0.04}; 
                if (bar > 15 && pos === 14 && bar % 2 === 0) fullTrackData.hato[i] = {a:1, v: 0.08};

                if (!isBreak && bar > 15 && (pos === 0 || pos === 3 || pos === 8 || pos === 13)) fullTrackData.bass[i] = {a:1};

                // The Turntablism Engine: Algorithmic Phrasing over 5 minutes
                if (bar < 16) {
                    if (pos === 0) fullTrackData.synth[i] = {a:1, p: 'baby_fwd'};
                    if (pos === 2) fullTrackData.synth[i] = {a:1, p: 'baby_rev'};
                    if (pos === 8) fullTrackData.synth[i] = {a:1, p: 'baby_fwd'};
                    if (pos === 10) fullTrackData.synth[i] = {a:1, p: 'baby_rev'};
                    if (pos === 11) fullTrackData.synth[i] = {a:1, p: 'baby_fwd'};
                } else if (bar >= 16 && bar < 32) {
                    if (pos === 0) fullTrackData.synth[i] = {a:1, p: 'transformer'};
                    if (pos === 6) fullTrackData.synth[i] = {a:1, p: 'chirp'};
                    if (pos === 8) fullTrackData.synth[i] = {a:1, p: 'drag_fwd'};
                } else if (bar >= 32 && bar < 64) {
                    // Main drop complex rhythm
                    if (bar % 4 === 0) {
                        if(pos === 0) fullTrackData.synth[i] = {a:1, p: 'baby_fwd'};
                        if(pos === 2) fullTrackData.synth[i] = {a:1, p: 'baby_rev'};
                        if(pos === 8) fullTrackData.synth[i] = {a:1, p: 'chirp'};
                        if(pos === 10) fullTrackData.synth[i] = {a:1, p: 'chirp'};
                    } else if (bar % 4 === 1) {
                        if(pos === 0) fullTrackData.synth[i] = {a:1, p: 'drag_fwd'};
                        if(pos === 12) fullTrackData.synth[i] = {a:1, p: 'transformer'};
                    } else if (bar % 4 === 3) {
                        if(pos === 0) fullTrackData.synth[i] = {a:1, p: 'baby_fwd'};
                        if(pos === 4) fullTrackData.synth[i] = {a:1, p: 'baby_rev'};
                        if(pos === 8) fullTrackData.synth[i] = {a:1, p: 'transformer'};
                    }
                } else if (bar >= 80) {
                    // Frenetic Finale
                    if (pos % 4 === 0) fullTrackData.synth[i] = {a:1, p: 'chirp'};
                    if (pos % 4 === 2) fullTrackData.synth[i] = {a:1, p: 'baby_rev'};
                }
            }
        }


        // --- DYNAMIC UI BUILDER ---
        function buildGrid(songId) {
            barLabels.innerHTML = ''; playheadTrack.innerHTML = ''; tracksContainer.innerHTML = ''; arrangement = {};
            const fragLabels = document.createDocumentFragment(); const fragPlayhead = document.createDocumentFragment();

            for(let i=0; i<TOTAL_BARS; i++) {
                const label = document.createElement('div'); label.className = 'bar-label';
                label.innerText = i + 1; label.dataset.bar = i; fragLabels.appendChild(label);
                const ph = document.createElement('div'); ph.className = 'playhead-col'; ph.id = `ph-${i}`;
                fragPlayhead.appendChild(ph);
            }
            barLabels.appendChild(fragLabels); playheadTrack.appendChild(fragPlayhead);

            TRACK_DEFS.forEach(def => {
                arrangement[def.id] = Array(TOTAL_BARS).fill(true); // Default all on
                const trackEl = document.createElement('div'); trackEl.className = `track ${def.class}`;
                const label = document.createElement('div'); label.className = 'track-label';
                let labelText = def.name; if (songId === 'c2c' && def.id === 'synth') labelText = 'SCRATCH';
                label.innerText = labelText; label.title = labelText; trackEl.appendChild(label);

                const grid = document.createElement('div'); grid.className = 'track-grid';
                const fragGrid = document.createDocumentFragment();

                for(let bar=0; bar<TOTAL_BARS; bar++) {
                    const cell = document.createElement('div'); cell.className = 'grid-cell'; cell.id = `cell-${def.id}-${bar}`;
                    
                    // UI ONLY active if the compiler actually wrote notes for this bar!
                    let hasNotes = false;
                    for(let step=0; step<16; step++) {
                        if (fullTrackData[def.id][bar * 16 + step].a > 0) hasNotes = true;
                    }
                    arrangement[def.id][bar] = hasNotes;

                    if (arrangement[def.id][bar]) cell.classList.add('active');
                    
                    // The UI click is strictly for muting/unmuting the pre-compiled audio
                    cell.addEventListener('click', () => {
                        arrangement[def.id][bar] = !arrangement[def.id][bar];
                        cell.classList.toggle('active', arrangement[def.id][bar]);
                    });
                    fragGrid.appendChild(cell);
                }
                grid.appendChild(fragGrid); trackEl.appendChild(grid); tracksContainer.appendChild(trackEl);
            });
        }

        function loadPreset(songId) {
            currentSong = songId; 
            
            // Execute the full-track compilers!
            if (songId === 'chem') compileChem();
            else if (songId === 'sp') compileSp();
            else if (songId === 'tesla') compileTesla();
            else if (songId === 'c2c') compileC2c();

            if(songId === 'c2c') mainContainer.classList.add('c2c-active'); else mainContainer.classList.remove('c2c-active');
            buildGrid(songId);
        }

        function updatePlayheadUI(activeBar) {
            for(let i=0; i<TOTAL_BARS; i++) {
                const ph = document.getElementById(`ph-${i}`);
                if (ph) ph.classList.toggle('playing', i === activeBar);
            }
            if (activeBar >= 0) {
                const cell = document.getElementById(`cell-kick-${activeBar}`);
                if (cell && arrangerWrapper) {
                    const leftPos = cell.offsetLeft + 100; const scrollLeft = arrangerWrapper.scrollLeft; const width = arrangerWrapper.clientWidth;
                    if (leftPos > scrollLeft + width - 150 || leftPos < scrollLeft + 50) arrangerWrapper.scrollTo({ left: leftPos - (width / 2), behavior: 'smooth' });
                }
            }
        }

        barLabels.addEventListener('click', (e) => {
            if (e.target.classList.contains('bar-label')) {
                const targetBar = parseInt(e.target.dataset.bar, 10);
                currentStep = targetBar * STEPS_PER_BAR;
                if (ctx && isPlaying) nextNoteTime = ctx.currentTime + 0.05; 
                updatePlayheadUI(targetBar);
            }
        });

        // --- AUDIO ENGINE ---

        async function initAudio() {
            if (ctx && ctx.state !== 'closed') await ctx.close();
            ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            globalScratchBufferFwd = null; globalScratchBufferRev = null; globalNoiseBuffer = null;

            analyserScope = ctx.createAnalyser(); analyserScope.fftSize = 2048; scopeData = new Float32Array(analyserScope.frequencyBinCount);
            analyserSpectrum = ctx.createAnalyser(); analyserSpectrum.fftSize = 128; spectrumData = new Uint8Array(analyserSpectrum.frequencyBinCount);

            masterSaturation = ctx.createWaveShaper(); masterSaturation.curve = makeDistortionCurve(5); masterSaturation.oversample = '4x';
            masterCompressor = ctx.createDynamicsCompressor(); masterCompressor.threshold.value = -12; masterCompressor.knee.value = 20;
            masterCompressor.ratio.value = 3; masterCompressor.attack.value = 0.005; masterCompressor.release.value = 0.15;
            masterGain = ctx.createGain(); masterGain.gain.value = 0.65; 

            sidechainBus = ctx.createGain(); sidechainBus.gain.value = 1;
            delayNode = ctx.createDelay(); delayFeedback = ctx.createGain(); delayFilter = ctx.createBiquadFilter();
            delayNode.delayTime.value = (60 / bpm) * 0.75; delayFeedback.gain.value = 0.3;
            delayFilter.type = 'highpass'; delayFilter.frequency.value = 800;
            delayNode.connect(delayFilter); delayFilter.connect(delayFeedback); delayFeedback.connect(delayNode);
            
            sidechainBus.connect(masterSaturation); delayNode.connect(masterSaturation);
            masterSaturation.connect(masterCompressor); masterCompressor.connect(masterGain);
            masterGain.connect(analyserScope); masterGain.connect(analyserSpectrum); analyserScope.connect(ctx.destination);
            
            await generateScratchBuffersAsync(); 
        }

        function makeDistortionCurve(amount = 50) {
            const n_samples = 44100; const curve = new Float32Array(n_samples); const deg = Math.PI / 180;
            for (let i = 0; i < n_samples; ++i) { let x = (i * 2) / n_samples - 1; curve[i] = (3 + amount) * x * 20 * deg / (Math.PI + amount * Math.abs(x)); }
            return curve;
        }

        function createNoiseBuffer() {
            if(!ctx) return null; if(globalNoiseBuffer) return globalNoiseBuffer;
            const bufferSize = ctx.sampleRate * 2.0; const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            globalNoiseBuffer = buffer; return buffer;
        }

        // ---------------------------------------------------------
        // OFFLINE SAMPLER (KILLING THE RUBBER DUCKY)
        // Uses true subtractive synthesis with Biquad Formant filters
        // ---------------------------------------------------------
        async function generateScratchBuffersAsync() {
            if (!ctx || globalScratchBufferFwd) return;
            const len = ctx.sampleRate * 1.5; 
            const offlineCtx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, len, ctx.sampleRate);
            
            // Raw 110Hz Sawtooth (Fundamental Vocal Cord)
            const osc = offlineCtx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = 110; 
            
            // Raw breath noise
            const noiseBuf = offlineCtx.createBuffer(1, len, offlineCtx.sampleRate);
            const nData = noiseBuf.getChannelData(0);
            for(let i=0; i<len; i++) nData[i] = Math.random()*2-1;
            const noise = offlineCtx.createBufferSource();
            noise.buffer = noiseBuf;

            const oscGain = offlineCtx.createGain(); oscGain.gain.value = 0.7;
            const noiseGain = offlineCtx.createGain(); noiseGain.gain.value = 0.3;

            // Formant Filters (The shape of the human mouth making an "Ahh" sound)
            const f1 = offlineCtx.createBiquadFilter(); f1.type = 'bandpass'; f1.frequency.value = 730; f1.Q.value = 4.0;
            const f2 = offlineCtx.createBiquadFilter(); f2.type = 'bandpass'; f2.frequency.value = 1090; f2.Q.value = 4.0;
            const f3 = offlineCtx.createBiquadFilter(); f3.type = 'bandpass'; f3.frequency.value = 2440; f3.Q.value = 3.0;

            const master = offlineCtx.createGain();
            master.gain.setValueAtTime(1.0, 0);
            master.gain.exponentialRampToValueAtTime(0.01, 1.4); // Punchy hit

            osc.connect(oscGain); noise.connect(noiseGain);
            oscGain.connect(f1); oscGain.connect(f2); oscGain.connect(f3);
            noiseGain.connect(f1); noiseGain.connect(f2); noiseGain.connect(f3);

            f1.connect(master); f2.connect(master); f3.connect(master);
            master.connect(offlineCtx.destination);

            osc.start(0); noise.start(0);
            
            // Bake the complex math down into a static audio buffer instantly
            const renderedBuffer = await offlineCtx.startRendering();
            globalScratchBufferFwd = renderedBuffer;
            
            // Reverse the buffer memory for the backward vinyl pulls
            const rev = ctx.createBuffer(1, len, ctx.sampleRate);
            const fwdData = renderedBuffer.getChannelData(0);
            const revData = rev.getChannelData(0);
            for(let i=0; i<len; i++) {
                revData[i] = fwdData[len - 1 - i];
            }
            globalScratchBufferRev = rev;
        }

        // --- SYNTHESIS PRIMITIVES (Driven by Compiler Data) ---

        function playKick(time, isAcoustic) {
            const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sine';
            if (isAcoustic) {
                // ACOUSTIC BOOM BAP KICK
                osc.frequency.setValueAtTime(120, time); osc.frequency.exponentialRampToValueAtTime(40, time + 0.05); 
                const noise = ctx.createBufferSource(); noise.buffer = createNoiseBuffer();
                const noiseFilter = ctx.createBiquadFilter(); noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 2500;
                const noiseGain = ctx.createGain(); noiseGain.gain.setValueAtTime(0, time); noiseGain.gain.linearRampToValueAtTime(0.8, time + 0.002); noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.02); 
                noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterSaturation);
                noise.start(time); noise.stop(time + 0.05);
                gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.8, time + 0.005); gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            } else {
                // STANDARD EDM KICK
                osc.frequency.setValueAtTime(150, time); osc.frequency.exponentialRampToValueAtTime(45, time + 0.05); osc.frequency.exponentialRampToValueAtTime(20, time + 0.35);
                gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(1, time + 0.005); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.35);
            }
            osc.connect(gain); gain.connect(masterSaturation); osc.start(time); osc.stop(time + 0.5);
            sidechainBus.gain.setValueAtTime(1, time); sidechainBus.gain.exponentialRampToValueAtTime(0.15, time + 0.02); sidechainBus.gain.linearRampToValueAtTime(1, time + 0.30);
        }

        function playBassChem(time, freq, dur, filterSweep) {
            const osc = ctx.createOscillator(); const sub = ctx.createOscillator();
            osc.type = 'triangle'; sub.type = 'sine'; osc.frequency.value = freq; sub.frequency.value = freq / 2;

            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 1.0; 
            filter.frequency.setValueAtTime(80, time); filter.frequency.exponentialRampToValueAtTime(filterSweep, time + 0.02); filter.frequency.exponentialRampToValueAtTime(60, time + dur * 0.6);

            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.25, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + dur * 0.8);
            osc.connect(filter); sub.connect(filter); filter.connect(gain); gain.connect(sidechainBus); 
            osc.start(time); sub.start(time); osc.stop(time+dur); sub.stop(time+dur);
        }

        function playBassSP(time, freq, dur, fmIntensity) {
            const carrier = ctx.createOscillator(); const mod = ctx.createOscillator(); const sub = ctx.createOscillator();
            const knock = ctx.createOscillator(); const modGain = ctx.createGain();
            carrier.type = 'sine'; mod.type = 'sine'; sub.type = 'triangle'; knock.type = 'sine'; 
            carrier.frequency.value = freq; mod.frequency.value = freq * 2; sub.frequency.value = freq / 2;
            knock.frequency.setValueAtTime(400, time); knock.frequency.exponentialRampToValueAtTime(50, time + 0.02);
            const knockGain = ctx.createGain(); knockGain.gain.setValueAtTime(0.2, time); knockGain.gain.exponentialRampToValueAtTime(0.01, time + 0.02); knock.connect(knockGain);

            modGain.gain.setValueAtTime(fmIntensity, time); modGain.gain.exponentialRampToValueAtTime(10, time + 0.15); 
            mod.connect(modGain); modGain.connect(carrier.frequency); 
            
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(1500, time); filter.frequency.exponentialRampToValueAtTime(300, time + dur * 0.8);
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.2, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + dur * 0.9);
            
            carrier.connect(filter); sub.connect(filter); knockGain.connect(filter); filter.connect(gain); gain.connect(sidechainBus); 
            mod.start(time); carrier.start(time); sub.start(time); knock.start(time);
            mod.stop(time+dur); carrier.stop(time+dur); sub.stop(time+dur); knock.stop(time+dur);
        }

        function playBassTesla(time, freq, dur, cutoffPeak) {
            const osc = ctx.createOscillator(); const sub = ctx.createOscillator();
            osc.type = 'sawtooth'; sub.type = 'sine'; osc.frequency.value = freq; sub.frequency.value = freq / 2;
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 4; 

            filter.frequency.setValueAtTime(cutoffPeak, time); filter.frequency.exponentialRampToValueAtTime(80, time + 0.12);
            const shaper = ctx.createWaveShaper(); shaper.curve = makeDistortionCurve(10); 
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.18, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + dur * 0.8);

            osc.connect(filter); sub.connect(filter); filter.connect(shaper); shaper.connect(gain); gain.connect(sidechainBus);
            osc.start(time); sub.start(time); osc.stop(time + dur); sub.stop(time + dur);
        }

        function playBassC2c(time, freq, dur) {
            const osc = ctx.createOscillator(); const sub = ctx.createOscillator();
            osc.type = 'square'; sub.type = 'sine'; // Groovy Square wave for hiphop
            
            // Portamento Glide for that funky movement
            osc.frequency.setValueAtTime(freq * 1.5, time); osc.frequency.exponentialRampToValueAtTime(freq, time + 0.04);
            sub.frequency.setValueAtTime(freq * 0.75, time); sub.frequency.exponentialRampToValueAtTime(freq / 2, time + 0.04);

            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 1.0; 
            filter.frequency.setValueAtTime(100, time); filter.frequency.exponentialRampToValueAtTime(600, time + 0.03); filter.frequency.exponentialRampToValueAtTime(80, time + dur * 0.5);
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.4, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + dur * 0.8);
            osc.connect(filter); sub.connect(filter); filter.connect(gain); gain.connect(sidechainBus);
            osc.start(time); sub.start(time); osc.stop(time+dur); sub.stop(time+dur);
        }

        function playHat(time, isOpen = false, velocity = 0.06) {
            const noise = ctx.createBufferSource(); noise.buffer = createNoiseBuffer();
            const highpass = ctx.createBiquadFilter(); highpass.type = 'highpass'; highpass.frequency.value = isOpen ? 7000 : 8500; 
            const bandpass = ctx.createBiquadFilter(); bandpass.type = 'bandpass'; bandpass.frequency.value = isOpen ? 9000 : 10000; bandpass.Q.value = 1.0;
            const panner = ctx.createStereoPanner(); panner.pan.value = isOpen ? 0.25 : -0.25; 

            const gain = ctx.createGain(); const dur = isOpen ? 0.25 : 0.06;
            gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(velocity, time + 0.002); gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            noise.connect(highpass); highpass.connect(bandpass); bandpass.connect(panner); panner.connect(gain); gain.connect(sidechainBus);
            noise.start(time); noise.stop(time + dur);
        }

        function playClap(time, isAcoustic) {
            const noiseBuffer = createNoiseBuffer();
            const filter = ctx.createBiquadFilter(); filter.type = 'bandpass'; filter.Q.value = 0.6;
            const panner = ctx.createStereoPanner(); panner.pan.value = (Math.random() - 0.5) * 0.4; 
            
            if (isAcoustic) {
                filter.frequency.value = 1000; 
                const tone = ctx.createOscillator(); tone.type = 'sine'; tone.frequency.setValueAtTime(250, time); tone.frequency.exponentialRampToValueAtTime(100, time + 0.1);
                const toneGain = ctx.createGain(); toneGain.gain.setValueAtTime(0.4, time); toneGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                tone.connect(toneGain); toneGain.connect(sidechainBus); tone.start(time); tone.stop(time + 0.15);
            } else { filter.frequency.value = 1500; }

            const burstTimes = isAcoustic ? [time, time + 0.01] : [time, time + 0.012, time + 0.024];
            burstTimes.forEach((t, i) => {
                const noise = ctx.createBufferSource(); noise.buffer = noiseBuffer; const gain = ctx.createGain();
                gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.15, t + 0.002);
                if (i === burstTimes.length - 1) gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25); else gain.gain.exponentialRampToValueAtTime(0.001, t + 0.01);
                noise.connect(gain); gain.connect(filter); noise.start(t); noise.stop(t + 0.3);
            });
            filter.connect(panner); panner.connect(sidechainBus);
            const send = ctx.createGain(); send.gain.value = 0.2; panner.connect(send); send.connect(delayNode);
        }

        function playVinylScratch(time, type, duration) {
            if (!globalScratchBufferFwd || !globalScratchBufferRev) return;
            const source = ctx.createBufferSource(); const gain = ctx.createGain();
            const noise = ctx.createBufferSource(); noise.buffer = createNoiseBuffer();
            const noiseFilter = ctx.createBiquadFilter(); noiseFilter.type = 'highpass'; noiseFilter.frequency.value = 4000;
            const noiseGain = ctx.createGain();

            source.connect(gain); gain.connect(masterCompressor); 
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterCompressor);

            let rateCurve;
            const fade = 0.01; // 10ms fader cuts to prevent audio popping
            
            if (type.includes('rev')) source.buffer = globalScratchBufferRev; 
            else source.buffer = globalScratchBufferFwd;

            // Authentic Turntablism physics
            if (type === 'baby_fwd' || type === 'baby_rev') {
                rateCurve = new Float32Array([0, 1.5, 1.5, 0]);
                gain.gain.setValueAtTime(0, time); 
                gain.gain.linearRampToValueAtTime(0.7, time + fade);
                gain.gain.setValueAtTime(0.7, time + duration - fade);
                gain.gain.linearRampToValueAtTime(0, time + duration);
            } else if (type === 'drag_fwd' || type === 'drag_rev') {
                rateCurve = new Float32Array([1.5, 1.0, 0.5, 0.2, 0]);
                gain.gain.setValueAtTime(0, time);
                gain.gain.linearRampToValueAtTime(0.7, time + fade);
                gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
            } else if (type === 'transformer') {
                rateCurve = new Float32Array([1.2, 1.0, 0.8, 0.5, 0.2]);
                gain.gain.setValueAtTime(0, time);
                for(let i=0; i<4; i++) {
                    let step = duration / 4;
                    gain.gain.setValueAtTime(0, time + i*step);
                    gain.gain.linearRampToValueAtTime(0.7, time + i*step + fade);
                    gain.gain.setValueAtTime(0.7, time + i*step + step/2 - fade);
                    gain.gain.linearRampToValueAtTime(0, time + i*step + step/2);
                }
            } else if (type === 'chirp') {
                rateCurve = new Float32Array([0.5, 2.0, 3.0]);
                gain.gain.setValueAtTime(0, time); 
                gain.gain.linearRampToValueAtTime(0.8, time + fade); 
                gain.gain.setValueAtTime(0.8, time + duration * 0.6);
                gain.gain.linearRampToValueAtTime(0, time + duration * 0.7); 
            }

            noiseGain.gain.setValueAtTime(0, time);
            noiseGain.gain.linearRampToValueAtTime(0.05, time + fade);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, time + duration);
            
            source.playbackRate.setValueCurveAtTime(rateCurve, time, duration);
            source.start(time); source.stop(time + duration); noise.start(time); noise.stop(time + duration);
        }

        function playSynthPad(time, dur, rootFreq) {
            const oscL = ctx.createOscillator(); const oscR = ctx.createOscillator(); const oscSub = ctx.createOscillator();
            oscL.type = 'sawtooth'; oscR.type = 'sawtooth'; oscSub.type = 'sine'; 
            oscL.frequency.value = rootFreq * 0.99; oscR.frequency.value = rootFreq * 1.01; oscSub.frequency.value = rootFreq / 2; 
            const panL = ctx.createStereoPanner(); const panR = ctx.createStereoPanner(); panL.pan.value = -0.9; panR.pan.value = 0.9;
            
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 0.5;
            filter.frequency.setValueAtTime(200, time); filter.frequency.linearRampToValueAtTime(1500, time + dur / 2); filter.frequency.linearRampToValueAtTime(200, time + dur);
            
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.08, time + dur * 0.2); gain.gain.linearRampToValueAtTime(0, time + dur);
            
            oscL.connect(panL); oscR.connect(panR); oscSub.connect(filter); panL.connect(filter); panR.connect(filter); filter.connect(gain); gain.connect(sidechainBus);
            oscL.start(time); oscR.start(time); oscSub.start(time); oscL.stop(time + dur); oscR.stop(time + dur); oscSub.stop(time + dur);
        }

        function playSynthStab(time, rootFreq) {
            const chordRatios = [1, 1.189, 1.498, 1.781]; 
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 1;
            filter.frequency.setValueAtTime(2500, time); filter.frequency.exponentialRampToValueAtTime(300, time + 0.15);
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.12, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15); 
            
            chordRatios.forEach(ratio => { const osc = ctx.createOscillator(); osc.type = 'sawtooth'; osc.frequency.value = rootFreq * ratio; osc.connect(filter); osc.start(time); osc.stop(time + 0.2); });
            filter.connect(gain); gain.connect(sidechainBus);
            const send = ctx.createGain(); send.gain.value = 0.2; gain.connect(send); send.connect(delayNode);
        }

        function playSynthTesla(time, rootFreq) {
            const osc1 = ctx.createOscillator(); const osc2 = ctx.createOscillator(); osc1.type = 'square'; osc2.type = 'sawtooth';
            osc1.frequency.value = rootFreq; osc2.frequency.value = rootFreq * 1.01;
            const filter = ctx.createBiquadFilter(); filter.type = 'lowpass'; filter.Q.value = 2;
            filter.frequency.setValueAtTime(3500, time); filter.frequency.exponentialRampToValueAtTime(200, time + 0.1);
            const panner = ctx.createStereoPanner(); panner.pan.value = (Math.random() - 0.5) * 0.6; 
            const gain = ctx.createGain(); gain.gain.setValueAtTime(0, time); gain.gain.linearRampToValueAtTime(0.1, time + 0.01); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.12);
            osc1.connect(filter); osc2.connect(filter); filter.connect(panner); panner.connect(gain); gain.connect(sidechainBus);
            const send = ctx.createGain(); send.gain.value = 0.2; gain.connect(send); send.connect(delayNode);
            osc1.start(time); osc2.start(time); osc1.stop(time + 0.2); osc2.stop(time + 0.2);
        }

        // --- LOOKAHEAD SCHEDULER (Reads from Unrolled Arrays) ---
        
        function scheduleNote(stepNum, time) {
            const bar = Math.floor(stepNum / 16);
            if (stepNum % 16 === 0) requestAnimationFrame(() => updatePlayheadUI(bar));

            let k = fullTrackData.kick[stepNum];
            let b = fullTrackData.bass[stepNum];
            let c = fullTrackData.clap[stepNum];
            let hc = fullTrackData.hatc[stepNum];
            let ho = fullTrackData.hato[stepNum];
            let sy = fullTrackData.synth[stepNum];

            const stepTime = (60 / bpm) / 4;

            // UI Acts as a Mute Switch ONLY. If toggled off, skip the compiled data.
            if (arrangement.kick[bar] && k.a > 0) playKick(time, currentSong === 'c2c');
            
            if (arrangement.bass[bar] && b.a > 0) {
                if (currentSong === 'chem') playBassChem(time, b.n, stepTime * 1.5, b.p);
                else if (currentSong === 'sp') playBassSP(time, 49.00, stepTime * 1.2, b.p);
                else if (currentSong === 'c2c') playBassC2c(time, 36.71, stepTime * 1.5);
                else playBassTesla(time, b.n, stepTime * 1.2, b.p);
            }
            
            if (arrangement.clap[bar] && c.a > 0) playClap(time, currentSong === 'c2c');
            if (arrangement.hatc[bar] && hc.a > 0) playHat(time, false, hc.v);
            if (arrangement.hato[bar] && ho.a > 0) playHat(time, true, ho.v);
            
            if (arrangement.synth[bar] && sy.a > 0) {
                if (currentSong === 'c2c') {
                    playVinylScratch(time, sy.p, stepTime * (sy.p === 'transformer' || sy.p === 'drag_fwd' ? 2 : 1));
                } else {
                    if (currentSong === 'chem') playSynthPad(time, stepTime * 16, sy.p); 
                    else if (currentSong === 'sp') playSynthStab(time, sy.p);
                    else if (currentSong === 'tesla') playSynthTesla(time, sy.p);
                }
            }
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / bpm;
            nextNoteTime += 0.25 * secondsPerBeat; 
            currentStep++;
        }

        function scheduler() {
            while (nextNoteTime < ctx.currentTime + 0.1 && currentStep < TOTAL_STEPS) {
                scheduleNote(currentStep, nextNoteTime);
                nextNote();
            }
            if (currentStep < TOTAL_STEPS && isPlaying) schedulerTimer = setTimeout(scheduler, 25);
            else if (currentStep >= TOTAL_STEPS) schedulerTimer = setTimeout(stopAudio, 2000);
        }

        async function startPlayback(songId) {
            if (isPlaying) stopAudio();
            if (currentSong !== songId || currentStep >= TOTAL_STEPS) {
                loadPreset(songId);
                currentStep = 0;
            }
            
            btnChem.disabled = true; btnSp.disabled = true; btnTesla.disabled = true; btnC2c.disabled = true;
            hudText.innerHTML = `STATUS: RENDERING AUDIO...<br>TIME: 0:00 / 0:00`;

            try {
                await initAudio();
                
                isPlaying = true;
                if(songId === 'chem') btnChem.classList.add('active-chem');
                if(songId === 'sp') btnSp.classList.add('active-sp');
                if(songId === 'tesla') btnTesla.classList.add('active-tesla');
                if(songId === 'c2c') btnC2c.classList.add('active-c2c');
                
                nextNoteTime = ctx.currentTime + 0.1;
                scheduler();
                drawVisualizer();
            } catch (e) {
                console.error("Audio Engine Error:", e);
                stopAudio();
            }
        }

        function stopAudio() {
            if (ctx && ctx.state !== 'closed') ctx.close();
            isPlaying = false;
            clearTimeout(schedulerTimer);
            cancelAnimationFrame(animationId);
            
            btnChem.disabled = false; btnChem.classList.remove('active-chem');
            btnSp.disabled = false; btnSp.classList.remove('active-sp');
            btnTesla.disabled = false; btnTesla.classList.remove('active-tesla');
            btnC2c.disabled = false; btnC2c.classList.remove('active-c2c');
            
            const totalDurationSecs = (TOTAL_STEPS * (60/bpm) / 4);
            const elapsedSecs = Math.min((currentStep * (60/bpm) / 4), totalDurationSecs);
            hudText.innerHTML = `STATUS: PAUSED<br>TIME: ${formatTime(elapsedSecs)} / ${formatTime(totalDurationSecs)}`;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // --- VISUALIZER ---
        function drawVisualizer() {
            if (!isPlaying) return;
            animationId = requestAnimationFrame(drawVisualizer);

            const w = canvas.width; const h = canvas.height;
            const color = currentSong === 'chem' ? '#00ffcc' : (currentSong === 'sp' ? '#ff0055' : (currentSong === 'c2c' ? '#ff00ff' : '#00ffff'));

            canvasCtx.fillStyle = 'rgba(0, 0, 0, 0.3)'; canvasCtx.fillRect(0, 0, w, h);
            analyserSpectrum.getByteFrequencyData(spectrumData);
            const barWidth = (w / spectrumData.length) * 2.5; let x = 0;
            for (let i = 0; i < spectrumData.length; i++) {
                const barHeight = (spectrumData[i] / 255) * h;
                canvasCtx.fillStyle = color + '44'; canvasCtx.fillRect(x, h - barHeight, barWidth, barHeight); x += barWidth + 2;
            }

            analyserScope.getFloatTimeDomainData(scopeData);
            canvasCtx.lineWidth = 3; canvasCtx.strokeStyle = color; canvasCtx.beginPath();
            const sliceWidth = w * 1.0 / scopeData.length; x = 0;
            for (let i = 0; i < scopeData.length; i++) {
                const v = scopeData[i] * 0.8; const y = (h / 2) + (v * h / 2);
                if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y); x += sliceWidth;
            }
            canvasCtx.stroke();

            const totalDurationSecs = (TOTAL_STEPS * (60/bpm) / 4);
            const elapsedSecs = Math.min((currentStep * (60/bpm) / 4), totalDurationSecs);
            hudText.innerHTML = `STATUS: PLAYING [${bpm} BPM]<br>TIME: ${formatTime(elapsedSecs)} / ${formatTime(totalDurationSecs)}`;
        }

        // --- EVENTS ---
        loadPreset('chem'); 
        btnChem.addEventListener('click', () => startPlayback('chem'));
        btnSp.addEventListener('click', () => startPlayback('sp'));
        btnTesla.addEventListener('click', () => startPlayback('tesla'));
        btnC2c.addEventListener('click', () => startPlayback('c2c'));
        stopBtn.addEventListener('click', stopAudio);

        canvasCtx.fillStyle = '#000'; canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
