name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: npm ci (root)
        run: npm ci

      - name: npm ci (desktop)
        run: npm ci
        working-directory: desktop

      - name: build root
        run: npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Tauri build (no bundle)
        env:
          CI: false
        run: npm run build:ci
        working-directory: desktop
