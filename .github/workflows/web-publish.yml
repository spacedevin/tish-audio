name: Web Publish (GitHub Pages)

on:
  release:
    types: [published, edited]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to Pages
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    steps:
      - name: Download dist.zip from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_URL=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "dist.zip") | .url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Release has no asset dist.zip"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL" -o dist.zip

      - name: Download app-manifest.json from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSET_URL=$(echo '${{ toJSON(github.event.release.assets) }}' | jq -r '.[] | select(.name == "app-manifest.json") | .url')
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "Release has no asset app-manifest.json"
            exit 1
          fi
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/octet-stream" "$ASSET_URL" -o app-manifest.json

      - name: Unzip dist
        run: |
          unzip dist.zip -d _site
          cp app-manifest.json _site/app-manifest.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update release description with Pages URL
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PAGES_URL="${{ steps.deployment.outputs.page_url }}"
          RELEASE_ID="${{ github.event.release.id }}"
          REPO="${{ github.repository }}"
          CURRENT_BODY=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" | jq -r '.body // ""')
          NEW_BODY="${CURRENT_BODY}
          
          ---
          Deployed to GitHub Pages: ${PAGES_URL}"
          curl -s -X PATCH \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" \
            -d "$(printf '%s' "$NEW_BODY" | jq -Rs '{body: .}')"
